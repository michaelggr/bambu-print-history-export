﻿﻿﻿﻿﻿﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Bambu 打印历史 - 小程序图标</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0c14;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 40px;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
    color: #9B9BB0;
  }
  .preview-group {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 30px;
  }
  .label {
    text-align: center;
    margin-top: 10px;
    font-size: 13px;
  }

  /* ===== 图标核心样式（与小程序一致）===== */
  .icon-wrap { display: flex; align-items: center; justify-content: center; }
  .icon-bg {
    width: 100%; height: 100%;
    border-radius: 22%;
    background: linear-gradient(145deg, #161829, #0D0F1A);
    border: 2px solid #2A2D45;
    position: relative;
    overflow: hidden;
    display: flex; flex-direction: column; align-items: center;
  }
  .icon-glow {
    position: absolute; top: 0; left: 10%; right: 10%; height: 30%;
    background: linear-gradient(to bottom, rgba(0,212,170,.08), transparent);
    border-radius: 0 0 50% 50%;
  }
  /* 喷嘴 */
  .nozzle-body {
    width: 18%; height: 14%; background: rgba(0,212,170,.12);
    border: 2px solid #00D4AA; border-radius: 3px 3px 1px 1px;
    position: relative; z-index: 3; margin-top: 16%;
  }
  .nozzle-feed {
    position: absolute; top: 2px; left: 50%; transform: translateX(-50%);
    width: 30%; height: 3px; background: #00D4AA; opacity: .5; border-radius: 1px;
  }
  .nozzle-tip {
    width: 10%; height: 8%; background: #00D4AA; opacity: .6;
    border-radius: 0 0 50% 50%; position: relative; z-index: 3; margin-top: -1%;
  }
  /* 柱状图区域 */
  .chart-area {
    width: 60%; height: 36%; position: relative;
    display: flex; align-items: flex-end; justify-content: space-around;
    padding: 0 6%; box-sizing: border-box; margin-top: 4%; z-index: 2;
  }
  .bar { width: 16%; border-radius: 2px 2px 1px 1px; }
  .bar-1 { height: 40%; background: rgba(0,212,170,.25); border: 1px solid rgba(0,212,170,.35); }
  .bar-2 { height: 70%; background: rgba(0,212,170,.30); border: 1px solid rgba(0,212,170,.45); }
  .bar-3 { height: 50%; background: rgba(0,212,170,.25); border: 1px solid rgba(0,212,170,.35); }
  .bar-4 { height: 85%; background: rgba(0,212,170,.35); border: 1px solid rgba(0,212,170,.5); }
  .print-layer {
    position: absolute; bottom: 12%; left: 4%; right: 4%; height: 3px;
    background: #00D4AA; border-radius: 2px; opacity: .9;
    box-shadow: 0 0 8px rgba(0,212,170,.6);
  }
  .print-scan {
    position: absolute; right: 0; top: -3px; width: 20%; height: 9px;
    background: linear-gradient(to left, #00D4AA, transparent); opacity: .7; border-radius: 2px;
  }
  .bed-line {
    position: absolute; bottom: 4%; left: 0; right: 0; height: 2px;
    background: #00D4AA; opacity: .25; border-radius: 1px;
  }
  /* 指示点 */
  .dots {
    position: absolute; right: 12%; top: 38%;
    display: flex; flex-direction: column; gap: 5px; z-index: 2;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%;
    background: rgba(0,212,170,.15); border: 1px solid rgba(0,212,170,.3);
  }
  .dot.active { background: #00D4AA; opacity: .7; box-shadow: 0 0 4px rgba(0,212,170,.4); }

  /* 各尺寸 */
  .s-120 { width: 120px; height: 120px; }
  .s-256 { width: 256px; height: 256px; }
  .s-512 { width: 512px; height: 512px; }
</style>
</head>
<body>

<div class="label" style="font-size:18px;color:#E8E8F0;margin-bottom:20px;">右键点击下方图标 → 另存为图片 → 上传到微信后台</div>

<div class="preview-group">
  <div>
    <div class="icon-wrap s-120"><div class="icon-bg">
      <div class="icon-glow"></div>
      <div class="nozzle-body"><div class="nozzle-feed"></div></div>
      <div class="nozzle-tip"></div>
      <div class="chart-area">
        <div class="bar bar-1"></div><div class="bar bar-2"></div>
        <div class="bar bar-3"></div><div class="bar bar-4"></div>
        <div class="print-layer"><div class="print-scan"></div></div>
        <div class="bed-line"></div>
      </div>
      <div class="dots"><div class="dot active"></div><div class="dot active"></div><div class="dot"></div></div>
    </div></div>
    <div class="label">120×120<br>预览尺寸</div>
  </div>

  <div>
    <div class="icon-wrap s-256"><div class="icon-bg">
      <div class="icon-glow"></div>
      <div class="nozzle-body"><div class="nozzle-feed"></div></div>
      <div class="nozzle-tip"></div>
      <div class="chart-area">
        <div class="bar bar-1"></div><div class="bar bar-2"></div>
        <div class="bar bar-3"></div><div class="bar bar-4"></div>
        <div class="print-layer"><div class="print-scan"></div></div>
        <div class="bed-line"></div>
      </div>
      <div class="dots"><div class="dot active"></div><div class="dot active"></div><div class="dot"></div></div>
    </div></div>
    <div class="label">256×256<br>推荐尺寸 ✓</div>
  </div>

  <div>
    <div class="icon-wrap s-512"><div class="icon-bg">
      <div class="icon-glow"></div>
      <div class="nozzle-body"><div class="nozzle-feed"></div></div>
      <div class="nozzle-tip"></div>
      <div class="chart-area">
        <div class="bar bar-1"></div><div class="bar bar-2"></div>
        <div class="bar bar-3"></div><div class="bar bar-4"></div>
        <div class="print-layer"><div class="print-scan"></div></div>
        <div class="bed-line"></div>
      </div>
      <div class="dots"><div class="dot active"></div><div class="dot active"></div><div class="dot"></div></div>
    </div></div>
    <div class="label">512×512<br>高清大图</div>
  </div>
</div>

<div style="font-size:12px;margin-top:30px;text-align:center;line-height:1.8;">
  使用步骤：<br>
  ① 浏览器打开此文件 → ② 右键 256 或 512 的图标 → 图片另存为 PNG<br>
  ③ 登录 <b>mp.weixin.qq.com</b> → 设置 → 基本设置 → 图标 → 上传 PNG 文件<br>
  ⚠️ 微信要求：PNG 格式，不超过 500KB，建议 256×256 以上
</div>

</body>
</html>
