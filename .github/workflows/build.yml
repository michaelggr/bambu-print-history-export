name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── 准备：提取版本号 ──
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # 版本号各段转数字求和作为 versionCode（如 2.3.7 → 20307）
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

  # ── Windows (Electron) 构建 ──
  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-win-${{ hashFiles('package.json') }}
          restore-keys: nm-win-

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install dependencies
        run: npm install

      - name: Build Electron app
        run: npm run build:electron

      - name: Package Windows build
        run: npx electron-builder --win --publish never
        env:
          ELECTRON_CACHE: ~/.cache/electron

      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist-electron3/*.zip

      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist-electron3/win-unpacked/**/*.exe

  # ── Android (Capacitor) 构建 ──
  build-android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-linux-${{ hashFiles('package.json') }}
          restore-keys: nm-linux-

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Add Android platform
        run: |
          if [ -d "android/gradle" ]; then
            echo "Android platform already initialized, syncing..."
            npx cap sync android
          else
            if [ -d "android" ]; then
              echo "Removing incomplete android directory..."
              rm -rf android
            fi
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      # 自动同步版本号到 build.gradle
      - name: Update Android version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          VERSION_CODE="${{ needs.prepare.outputs.version_code }}"
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$VERSION\"/" android/app/build.gradle
          echo "Updated build.gradle: versionCode=$VERSION_CODE, versionName=$VERSION"

      # ── 签名配置 ──
      # 从 GitHub Secrets 解码密钥库文件
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          echo "KEYSTORE_FILE=release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV

      # 构建签名 release APK
      - name: Build signed release APK
        run: cd android && chmod +x gradlew && ./gradlew assembleRelease

      # 重命名 APK 为带版本号的文件名
      - name: Rename APK
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk "output/bambu-export-v${VERSION}.apk" 2>/dev/null || \
          cp android/app/build/outputs/apk/release/*.apk "output/bambu-export-v${VERSION}.apk"
          ls -la output/

      # 验证 APK 签名
      - name: Verify APK signature
        run: |
          APK_FILE=$(find output -name "*.apk" | head -1)
          if [ -n "$APK_FILE" ]; then
            echo "Verifying signature of $APK_FILE..."
            # 使用 apksigner 验证签名
            BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
            ${BUILD_TOOLS}apksigner verify --print-certs "$APK_FILE" || echo "Warning: apksigner not found, skipping verification"
          fi

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: output/*.apk

  # ── 创建 GitHub Release ──
  release:
    needs: [prepare, build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-zip/*
            artifacts/windows-exe/*
            artifacts/android-apk/*
          generate_release_notes: true
